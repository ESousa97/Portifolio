name: "Feature request"
description: "Sugira uma melhoria"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        > **⚠️ Projeto Arquivado**: Este repositório não está mais ativo e permanece público apenas para fins de estudo. Não há garantia de resposta, revisão ou correção para as issues abertas.
  - type: textarea
    id: problem
    attributes:
      label: "Qual problema você quer resolver?"
      description: "Descreva a motivação"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "Proposta"
      description: "Como você imagina a solução"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternativas"
      description: "Outras opções consideradas"
    validations:
      required: false
