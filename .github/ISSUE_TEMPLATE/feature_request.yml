name: "Feature request"
description: "Sugira uma melhoria"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "Qual problema você quer resolver?"
      description: "Descreva a motivação"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "Proposta"
      description: "Como você imagina a solução"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternativas"
      description: "Outras opções consideradas"
    validations:
      required: false
